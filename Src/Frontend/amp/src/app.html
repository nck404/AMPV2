<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#907aa9" />
        <meta name="google-site-verification" content="Rj5CohCzIgRnlj5wpCMKd4Rbv6iYBZTckWL8rTZArjI" />
        <link rel="manifest" href="/manifest.json" />
        <link
            rel="icon"
            type="image/png"
            href="%sveltekit.assets%/favicon.png"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;700;900&family=Playfair+Display:wght@400;700;900&family=Roboto:wght@400;700;900&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
            rel="stylesheet"
        />
        <script
            src="https://www.google.com/recaptcha/api.js"
            async
            defer
        ></script>
        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <title>AMP - Mạng Xã Hội & Hỗ Trợ Người Khuyết Tật</title>
        <meta
            name="title"
            content="AMP - Mạng Xã Hội & Hỗ Trợ Người Khuyết Tật"
        />
        <meta
            name="description"
            content="AMP là nền tảng mạng xã hội, diễn đàn và cơ hội việc làm chuyên biệt dành cho người khiếm thính, khiếm thị và người khuyết tật tại Việt Nam."
        />
        <meta
            name="keywords"
            content="AMP, người khuyết tật, mạng xã hội, việc làm, khiếm thính, khiếm thị, từ thiện, cộng đồng, ngôn ngữ ký hiệu, học ngôn ngữ ký hiệu, việc làm cho người khuyết tật, hỗ trợ người khiếm thị, hỗ trợ người khiếm thính, công cụ trợ năng, mạng xã hội người khuyết tật, từ thiện 4.0, cộng đồng hỗ trợ, sign language vietnam, accessibility tools, disability jobs, AMP platform, hỗ trợ cộng đồng"
        />
        <meta name="author" content="AMP Team" />
        <meta name="robots" content="index, follow" />
        <link rel="canonical" href="https://amp.prj.ydns.eu/" />

        <!-- Structured Data (JSON-LD) -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "Organization",
                "name": "AMP Platform",
                "url": "https://amp.prj.ydns.eu/",
                "logo": "https://amp.prj.ydns.eu/favicon.png",
                "description": "Nền tảng mạng xã hội, diễn đàn và cơ hội việc làm chuyên biệt dành cho người khiếm thính, khiếm thị và người khuyết tật tại Việt Nam.",
                "sameAs": [
                    "https://facebook.com/amp.platform",
                    "https://github.com/amp-platform"
                ]
            }
        </script>
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebSite",
                "name": "AMP - Nâng tầm Giá trị sống",
                "url": "https://amp.prj.ydns.eu/",
                "potentialAction": {
                    "@type": "SearchAction",
                    "target": "https://amp.prj.ydns.eu/forum?q={search_term_string}",
                    "query-input": "required name=search_term_string"
                }
            }
        </script>

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://amp.prj.ydns.eu/" />
        <meta
            property="og:title"
            content="AMP - Mạng Xã Hội & Hỗ Trợ Người Khuyết Tật"
        />
        <meta
            property="og:description"
            content="AMP là nền tảng mạng xã hội, diễn đàn và cơ hội việc làm chuyên biệt dành cho người khiếm thính, khiếm thị và người khuyết tật tại Việt Nam."
        />
        <meta property="og:image" content="%sveltekit.assets%/favicon.png" />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://amp.prj.ydns.eu/" />
        <meta
            property="twitter:title"
            content="AMP - Mạng Xã Hội & Hỗ Trợ Người Khuyết Tật"
        />
        <meta
            property="twitter:description"
            content="AMP là nền tảng mạng xã hội, diễn đàn và cơ hội việc làm chuyên biệt dành cho người khiếm thính, khiếm thị và người khuyết tật tại Việt Nam."
        />
        <meta
            property="twitter:image"
            content="%sveltekit.assets%/favicon.png"
        />
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
